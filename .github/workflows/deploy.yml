name: Deploy and Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - '*'
  schedule:
    - cron: '52 18 * * 2'

concurrency:
  group: "deploy"
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout self
      uses: actions/checkout@v4
      with:
        persist-credentials: false
    - name: Checkout scratch-gui
      uses: actions/checkout@v4
      with:
        repository: TurboWarp/scratch-gui
        path: scratch-gui
        persist-credentials: false
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
    - name: Build
      run: |
        cd scratch-gui
        npm ci
        NODE_ENV=production ROUTING_STYLE=hash npm run build
    - name: Patch
      run: python3 patch.py
    
    # ---------------- 增加打包 ZIP 的步骤 ----------------
    - name: Create ZIP archive
      run: |
        cd scratch-gui/build
        zip -r ../../turbowarp-build.zip ./*
    # -----------------------------------------------------

    - name: Upload pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./scratch-gui/build/
        retention-days: 30
        
    # ------------- 上传 ZIP 到构建工件（供非 Release 时下载）-------------
    - name: Upload ZIP artifact
      uses: actions/upload-artifact@v4
      with:
        name: turbowarp-offline-build
        path: ./turbowarp-build.zip
        retention-days: 30

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

  # --------- 增加一个新的 Job，用于创建 Release 并上传包 ---------
  release:
    runs-on: ubuntu-latest
    needs: build
    # 打 tag 触发或手动触发时才创建 Release，避免 push/定时任务刷爆 Release
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
    - name: Download ZIP artifact
      uses: actions/download-artifact@v4
      with:
        name: turbowarp-offline-build

    - name: Generate Release Tag
      id: generate_tag
      run: |
        if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
          echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
        else
          echo "TAG_NAME=build-$(date +'%Y%m%d%H%M%S')" >> $GITHUB_ENV
        fi

    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.TAG_NAME }}
        name: TurboWarp Offline Build ${{ env.TAG_NAME }}
        files: turbowarp-build.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}